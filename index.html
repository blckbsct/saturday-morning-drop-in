<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Saturday Morning Drop In Crew - Arcade Chaos Build</title>
<style>
html,body{margin:0;background:#03060a;color:#eee;font-family:Arial,Helvetica,sans-serif}
#wrap{display:flex;flex-direction:column;align-items:center;padding:12px}
canvas{background:#07111a;border:4px solid #111;image-rendering:pixelated;max-width:100%;height:auto;box-shadow:0 0 28px #000}
.help{max-width:960px;font-size:14px;line-height:1.35;color:#ddd;margin-top:8px}
b{color:#fff}
</style>
</head>
<body>
<div id="wrap">
<canvas id="game" width="960" height="540"></canvas>
<div class="help">
<b>Controls:</b> Select: Left/Right or A/D, Enter start. Game: WASD/Arrows skate, Space shoot, X pass/saucer, Shift check/special, Esc roster.
</div>
</div>
<script src="game.js"></script>
</body>
</html>
